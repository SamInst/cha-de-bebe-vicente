<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chá de Bebê do Vicente · Confirmados</title>
  <meta name="description" content="Lista de presenças confirmadas no Chá de Bebê do Vicente. 🧸" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧸</text></svg>" />

  <!-- Console na tela para depurar no celular: acesse a URL com ?debug=1 -->
  <script>
    (function () {
      if (!/[?&]debug/.test(location.search)) return;
      var s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/eruda";
      s.onload = function () { window.eruda && eruda.init(); };
      document.head.appendChild(s);
    })();
    window.addEventListener("error", function (e) {
      console.error("Erro:", e.message, "em", e.filename + ":" + e.lineno);
    });
    window.addEventListener("unhandledrejection", function (e) {
      console.error("Promise rejeitada:", e.reason && (e.reason.message || e.reason));
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Parisienne&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <!-- Céu de berçário -->
  <div class="sky" aria-hidden="true">
    <span class="star s1"></span><span class="star s2"></span><span class="star s3"></span>
    <span class="star s4"></span><span class="star s5"></span><span class="star s6"></span>
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="cloud c4"></div><div class="cloud c5"></div><div class="cloud c6"></div>
    <div class="cloud c7"></div><div class="cloud c8"></div><div class="cloud c9"></div>
    <div class="cloud c10"></div>
  </div>

  <main class="card">
    <div class="bear-illo reveal" style="--d:0">
      <img src="./assets/urso.png" alt="Ursinho com balões e luazinha sobre uma nuvem" loading="eager" />
    </div>

    <header class="hero reveal" style="--d:1">
      <p class="eyebrow">Lista de presenças confirmadas</p>
      <h1 class="title">Chá de Bebê</h1>
      <p class="name">Vicente</p>
    </header>

    <div class="count-pill reveal" style="--d:2" id="count-pill">
      <span class="bear-mini">🧸</span>
      <span id="count-text">Carregando…</span>
    </div>

    <section class="guest-list reveal" style="--d:3" id="guest-list" aria-live="polite">
      <p class="list-state" id="list-state">Buscando confirmações…</p>
    </section>

    <p class="signature">Feito com carinho para o nosso Vicente 🤍</p>
  </main>

  <script src="./assets/config.js?v=2"></script>
  <script src="./assets/lista.js?v=2"></script>
</body>
</html>
